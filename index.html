<!doctype html>
<html>
<head>
<meta charset="utf-8" />
<style>
  html, body {
    margin: 0;
    width: 100%;
    height: 100%;
    overflow: hidden;
    background: transparent;
    user-select: none;
    cursor: default;
  }

  #maxy {
    position: absolute;
    left: 0;
    top: 0;
    width: 220px;
    height: 223px;
    will-change: transform;
  }

  #inner {
    width: 100%;
    height: 100%;
    transition: transform 0.5s cubic-bezier(0.34, 1.56, 0.64, 1), opacity 0.6s ease;
  }

  #bob {
    width: 100%;
    height: 100%;
  }

  .idle #bob   { animation: bob 3.2s ease-in-out infinite; }
  .walking #bob { animation: waddle 0.55s ease-in-out infinite; }
  .asleep #bob { animation: breathe 4.5s ease-in-out infinite; }
  .panicking #bob { animation: shake 0.12s linear infinite; }

  @keyframes bob {
    0%, 100% { transform: translateY(0); }
    50%      { transform: translateY(-7px); }
  }
  @keyframes waddle {
    0%, 100% { transform: translateY(0) rotate(-3.5deg); }
    50%      { transform: translateY(-9px) rotate(3.5deg); }
  }
  @keyframes breathe {
    0%, 100% { transform: scaleY(1); }
    50%      { transform: scaleY(0.96) translateY(3px); }
  }
  @keyframes shake {
    0%   { transform: translate(-4px, 2px) rotate(-2deg); }
    50%  { transform: translate(4px, -2px) rotate(2deg); }
    100% { transform: translate(-3px, 1px) rotate(-1deg); }
  }

  svg { width: 100%; height: 100%; overflow: visible; }

  /* ---- face ---- */
  .eye {
    transform-box: fill-box;
    transform-origin: center;
    transition: transform 90ms ease;
  }
  .blinking .eye, .asleep-face .eye { transform: scaleY(0.07); }

  .brow { opacity: 0; transition: opacity 0.25s, transform 0.25s; transform-box: fill-box; transform-origin: center; }
  .mood-excited .brow { opacity: 1; transform: translateY(-10px); }
  .mood-worried .brow { opacity: 1; transform: rotate(14deg); }
  .mood-worried .brow.right { transform: rotate(-14deg); }

  .mouth { opacity: 0; }
  .mood-neutral .mouth-smile,
  .mood-excited .mouth-open,
  .mood-worried .mouth-worried,
  .mood-asleep  .mouth-sleep { opacity: 1; }

  #face { transition: opacity 1.1s ease; }
  .facehidden #face { opacity: 0; }

  /* ---- speech bubble (Ink & Print) ---- */
  #bubble {
    position: absolute;
    bottom: calc(100% + 14px);
    left: 50%;
    transform: translateX(-50%) translateY(6px);
    max-width: 420px;
    min-width: 140px;
    width: max-content;
    background: #fffaf0;
    color: #111827;
    border: 1px solid #e4dac8;
    border-radius: 10px;
    padding: 12px 16px;
    font: 18px/1.5 Georgia, 'Iowan Old Style', serif;
    box-shadow: 0 3px 14px rgba(14, 39, 88, 0.10);
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.3s ease, transform 0.3s ease;
  }
  #bubble.show { opacity: 1; transform: translateX(-50%) translateY(0); }
  #bubble::after {
    content: '';
    position: absolute;
    bottom: -6px;
    left: 50%;
    width: 10px;
    height: 10px;
    background: #fffaf0;
    border-right: 1px solid #e4dac8;
    border-bottom: 1px solid #e4dac8;
    transform: translateX(-50%) rotate(45deg);
  }
  #bubble .err { color: #b36e4e; font-style: italic; }
  #bubble h4 {
    margin: 0 0 6px;
    font-size: 11px;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: #1a3875;
    font-family: ui-monospace, 'SF Mono', monospace;
    font-weight: 600;
  }
  .polrow {
    display: flex;
    align-items: baseline;
    gap: 8px;
    font: 12px ui-monospace, 'SF Mono', monospace;
    color: #555555;
    margin: 2px 0;
  }
  .polrow .bar {
    height: 7px;
    background: #859ebe;
    border-radius: 2px;
    align-self: center;
  }
  .polrow .name { width: 78px; }
  .polrow .p { color: #999999; }

  .float {
    position: absolute;
    font: 700 20px Georgia, serif;
    color: #6e8050;
    pointer-events: none;
    animation: floatup 1.4s ease-out forwards;
  }
  .float.z { color: #859ebe; font-style: italic; }
  @keyframes floatup {
    from { opacity: 1; transform: translateY(0) rotate(0deg); }
    to   { opacity: 0; transform: translateY(-56px) rotate(12deg); }
  }

  /* ---- ranged fire effects ---- */
  #effects {
    position: fixed;
    inset: 0;
    overflow: hidden;
    pointer-events: none;
  }
  #effects::after {
    content: '';
    position: absolute;
    inset: 0;
    background: rgba(255, 92, 12, 0.16);
    opacity: 0;
    transition: opacity 180ms ease;
  }
  #effects.inferno-active::after { opacity: 1; }

  .fireball {
    position: absolute;
    z-index: 4;
    width: 58px;
    height: 42px;
    margin: -21px 0 0 -29px;
    border-radius: 52% 70% 52% 70%;
    background: radial-gradient(circle at 67% 50%, #fff7a8 0 13%, #ffc329 26%, #ff5c0c 54%, #b51c00 75%, transparent 77%);
    filter: drop-shadow(0 0 9px #ff8a00) drop-shadow(0 0 18px rgba(255, 35, 0, 0.8));
  }
  .fireball::before {
    content: '';
    position: absolute;
    right: 62%;
    top: 3px;
    width: 72px;
    height: 35px;
    background: linear-gradient(90deg, transparent, rgba(255, 65, 0, 0.3) 24%, #ff7417 64%, #ffd94f);
    clip-path: polygon(0 18%, 34% 39%, 4% 62%, 45% 74%, 100% 50%);
  }

  .ember {
    position: absolute;
    z-index: 3;
    width: 9px;
    height: 9px;
    margin: -4px;
    border-radius: 50% 0 50% 50%;
    background: #ffd84a;
    box-shadow: 0 0 8px #ff4a00;
    animation: ember-fly 720ms ease-out forwards;
  }
  @keyframes ember-fly {
    from { opacity: 1; transform: translate(0, 0) rotate(45deg) scale(var(--ember-scale, 1)); }
    to { opacity: 0; transform: translate(var(--ember-x), var(--ember-y)) rotate(180deg) scale(0.2); }
  }

  .fire-burst {
    position: absolute;
    z-index: 5;
    width: 44px;
    height: 44px;
    margin: -22px;
    border-radius: 50%;
    background: radial-gradient(circle, #fffbd0 0 8%, #ffd129 22%, #ff5c0c 46%, rgba(178, 21, 0, 0.72) 61%, transparent 70%);
    filter: drop-shadow(0 0 18px #ff3c00);
    animation: fire-burst 620ms ease-out forwards;
  }
  @keyframes fire-burst {
    from { opacity: 1; transform: scale(0.25); }
    55% { opacity: 1; transform: scale(2.8); }
    to { opacity: 0; transform: scale(3.7); }
  }

  .scorch {
    position: absolute;
    z-index: 1;
    width: 76px;
    height: 38px;
    margin: -19px 0 0 -38px;
    border-radius: 50%;
    background: radial-gradient(ellipse, rgba(35, 12, 7, 0.72), rgba(126, 31, 8, 0.42) 38%, transparent 72%);
    mix-blend-mode: multiply;
    animation: scorch-fade 5.2s ease-out forwards;
  }
  @keyframes scorch-fade {
    0%, 65% { opacity: 0.82; transform: scale(0.7); }
    12% { transform: scale(1); }
    to { opacity: 0; transform: scale(1.1); }
  }

  .damage-number {
    position: absolute;
    z-index: 7;
    color: #fff4b8;
    font: 900 22px/1 ui-monospace, 'SF Mono', monospace;
    text-shadow: 0 2px 0 #921b00, 0 0 8px #ff3d00;
    animation: damage-pop 1.15s ease-out forwards;
  }
  @keyframes damage-pop {
    from { opacity: 0; transform: translate(-50%, 8px) scale(0.55); }
    20% { opacity: 1; transform: translate(-50%, -8px) scale(1.2); }
    to { opacity: 0; transform: translate(-50%, -58px) scale(0.9); }
  }

  .fire-geyser {
    position: absolute;
    z-index: 3;
    height: 164px;
    margin-top: -82px;
    transform-origin: 0 50%;
    background:
      radial-gradient(ellipse at 8% 50%, #fffbd0 0 3%, #ffd129 12%, transparent 28%),
      linear-gradient(180deg, transparent 4%, rgba(255, 75, 0, 0.72) 17%, #ffbd24 37%, #fff4a1 49%, #ff9d11 61%, rgba(220, 31, 0, 0.78) 82%, transparent 96%);
    clip-path: polygon(0 42%, 7% 24%, 19% 16%, 32% 5%, 46% 17%, 60% 2%, 73% 14%, 87% 5%, 100% 23%, 96% 48%, 100% 76%, 83% 90%, 67% 82%, 53% 98%, 38% 84%, 24% 94%, 10% 75%, 0 59%);
    filter: drop-shadow(0 0 15px #ff3b00) drop-shadow(0 0 32px rgba(255, 95, 0, 0.9));
    animation: geyser-roar 2.35s ease-in-out forwards;
  }
  .fire-geyser::after {
    content: '';
    position: absolute;
    inset: 34% 0;
    background: linear-gradient(90deg, #fffde0, #ffd34a 35%, #fff8bc 62%, #ffbd21);
    filter: blur(5px);
  }
  @keyframes geyser-roar {
    0% { opacity: 0; transform: scaleX(0.02) scaleY(0.25); }
    12% { opacity: 1; transform: scaleX(1) scaleY(0.72); }
    28% { transform: scaleX(1) scaleY(1.08); }
    42% { transform: scaleX(1) scaleY(0.9); }
    58% { transform: scaleX(1) scaleY(1.13); }
    76% { opacity: 1; transform: scaleX(1) scaleY(0.96); }
    100% { opacity: 0; transform: scaleX(1) scaleY(0.2); }
  }
</style>
</head>
<body>
<div id="effects" aria-hidden="true"></div>
<div id="maxy" class="idle facehidden">
  <div id="bubble"></div>
  <div id="inner">
    <div id="bob">
      <svg id="char" viewBox="0 0 529.22 537.47" xmlns="http://www.w3.org/2000/svg">
        <!-- the Softmax logo, verbatim -->
        <path fill="#0e2758" d="M435.79,167.09c1.39,14.72,2.28,35.15.07,59.18-2.76,30-8.41,91.42-53.06,144.85-12.71,15.21-31.5,37.17-64.27,50.75-20.1,8.33-39.72,11.14-57.08,11.14-27.21,0-48.87-6.89-58.14-10.18-24.28-8.71-46.26-13.88-64.82-17.03-9.81-1.67-17.2-2.89-27.51-3.37-5.3-.24-11.2-.58-17.52-.58-14.97,0-32.31,1.91-49.66,11.55-7.2,4-22.36,11.82-33.28,28.4-2.31,3.5-5.73,7.26-7.1,13.17-.77,3.33-.83,6.45-.55,9.17,10.18,16.5,31.9,25.1,70.31,39.79,40.58,15.52,76.46,23.08,103.36,27.2,39.62,6.07,70.21,6.29,88.85,6.35.69,0,1.39,0,2.08,0,51.31,0,88.85-5.96,96.74-7.26,21.15-3.46,50.65-8.45,86.8-22.39,39.52-15.24,66.61-25.68,76.25-50.69,1.5-3.88,4.63-13.43-2.86-55.07-7.57-42.15-18.12-73.19-19.67-77.68-20.91-60.73-31.37-91.09-47.15-120.59-7.16-13.38-14.37-25.43-21.82-36.72"/>
        <path fill="#859ebe" d="M405.8,126.38c-2.7,14.13-7.43,33.47-16.19,55.39-9.33,23.33-17.43,43.59-36.11,63.7-9.73,10.47-34.11,36.7-70.49,40.89-3.28.38-6.47.55-9.6.55-15.24,0-29.13-4.16-46.48-9.36-22.64-6.78-33.98-14.37-61.63-19.18-10.17-1.77-16.26-2.83-24.53-2.83h-.34s-62.3.23-108.91,65.12c-.28.39-.55.77-.55.77-7.32,10.87-11.91,20.88-14.86,28.78-2.55,6.79-3.97,12.26-5.54,18.27-1.6,6.15-2.79,11.62-6.31,31.17-1.14,6.36-2.61,14.59-4.27,24.25,6.4-10.91,17.12-25.9,34.2-39.3,14.59-11.45,27.98-17.13,33.06-19.16,2.85-1.13,13.75-5.35,28.95-7.8,3.93-.63,12.18-1.8,23.2-1.8,8.13,0,17.77.63,28.3,2.58,6.67,1.23,16.61,3.13,28.41,8.15,4.01,1.7,11.21,5.03,18.85,9,4.92,2.56,8.37,4.53,14.18,7.14,4.9,2.21,9.03,3.76,11.78,4.74,0,0,19.23,6.36,40.24,6.98.99.03,1.96.04,2.91.04,5.34,0,9.68-.39,9.68-.39,6.6-.26,15.9-1.18,26.55-4.2,39.25-11.14,61.44-41.03,74.07-58.02,49.95-67.19,47.93-167.85,47.41-184.77-5.17-7.02-10.49-13.86-16.02-20.7"/>
        <path fill="#bbccf3" d="M263.85,0c-.17,0-.33,0-.49,0-9.56.13-18.97,3.98-51.45,33.34-34.1,30.83-48.96,48.06-48.96,48.06-45.84,53.13-68.77,79.69-92.48,121.49-30.3,53.41-44.91,100.09-51.23,123.02-.58,2.1-1.15,4.32-1.73,6.71,2.32-5.49,4.94-11.19,7.9-17.04,13.39-26.42,36.61-72.21,83.93-88.86,13.54-4.76,25.96-6.06,33.79-6.37,1.47-.06,2.91-.08,4.3-.08,27.39,0,38.73,10.82,72,18.83,15.27,3.67,31.78,7.88,49.5,7.88,9.36,0,19.06-1.17,29.1-4.22,36.49-11.06,56.44-41.33,63.25-51.53,15.36-23.02,19.95-45.23,21.9-55.14,2.47-12.57,3.14-23.85,3.04-33.14-6.32-7.35-12.92-14.91-19.87-22.86,0,0-17.39-19.89-51.98-49.48C282.51,3.39,272.5,0,263.85,0"/>

        <!-- the awakening: Maxy's face, on the light crest -->
        <g id="face" class="mood-neutral">
          <g class="eye left" transform="translate(203,128)">
            <ellipse rx="27" ry="31" fill="#fffdf4"/>
            <circle class="pupil" r="12.5" fill="#0e2758"/>
            <circle class="glint" cx="5" cy="-6" r="4" fill="#fffdf4"/>
          </g>
          <g class="eye right" transform="translate(288,112)">
            <ellipse rx="27" ry="31" fill="#fffdf4"/>
            <circle class="pupil" r="12.5" fill="#0e2758"/>
            <circle class="glint" cx="5" cy="-6" r="4" fill="#fffdf4"/>
          </g>
          <rect class="brow left"  x="182" y="82" width="44" height="9" rx="4.5" fill="#0e2758"/>
          <rect class="brow right" x="266" y="66" width="44" height="9" rx="4.5" fill="#0e2758"/>
          <path class="mouth mouth-smile"   d="M 216 183 Q 248 204 282 174" stroke="#0e2758" stroke-width="8" stroke-linecap="round" fill="none"/>
          <ellipse class="mouth mouth-open" cx="248" cy="185" rx="15" ry="19" fill="#0e2758"/>
          <path class="mouth mouth-worried" d="M 220 192 Q 248 172 278 182" stroke="#0e2758" stroke-width="8" stroke-linecap="round" fill="none"/>
          <path class="mouth mouth-sleep"   d="M 230 186 Q 248 192 268 182" stroke="#0e2758" stroke-width="6" stroke-linecap="round" fill="none"/>
        </g>
      </svg>
    </div>
  </div>
</div>

<script>
  const el = document.getElementById('maxy')
  const inner = document.getElementById('inner')
  const face = document.getElementById('face')
  const bubble = document.getElementById('bubble')
  const effects = document.getElementById('effects')
  const bridge = window.maxyBridge || {
    onCursor: () => {},
    onCommand: () => {},
    setInteractive: () => {},
  }

  const W = () => window.innerWidth
  const H = () => window.innerHeight
  const SIZE = 220
  const TOP_MARGIN = 140 // room for the speech bubble

  const state = {
    x: 0, y: 0,
    cursor: { x: -1e4, y: -1e4 },
    lastCursorMove: Date.now(),
    paused: false,
    asleep: false,
    dragging: false,
    interactive: false,
    busy: false,
  }

  const wait = (ms) => new Promise((r) => setTimeout(r, ms))
  const rand = (a, b) => a + Math.random() * (b - a)
  const clamp = (v, a, b) => Math.max(a, Math.min(b, v))

  function place(x, y) {
    state.x = clamp(x, -SIZE * 0.65, W() - SIZE * 0.35)
    state.y = clamp(y, TOP_MARGIN, H() - SIZE)
    el.style.transform = `translate3d(${state.x}px, ${state.y}px, 0)`
  }

  function setPose(pose) {
    el.classList.remove('idle', 'walking', 'asleep', 'panicking')
    el.classList.add(pose)
  }

  function setMood(mood) {
    face.setAttribute('class', 'mood-' + mood)
  }

  // ---------- eyes ----------
  function updatePupils() {
    const cx = state.x + SIZE / 2
    const cy = state.y + SIZE / 2
    const dx = state.cursor.x - cx
    const dy = state.cursor.y - cy
    const d = Math.hypot(dx, dy) || 1
    const k = Math.min(10, d / 30)
    const ox = (dx / d) * k
    const oy = (dy / d) * k
    for (const p of document.querySelectorAll('.pupil, .glint')) {
      p.style.transform = `translate(${ox}px, ${oy}px)`
    }
  }

  async function blink(times = 1) {
    for (let i = 0; i < times; i++) {
      el.classList.add('blinking')
      await wait(110)
      el.classList.remove('blinking')
      await wait(130)
    }
  }
  ;(async function blinkLoop() {
    while (true) {
      await wait(rand(2800, 6500))
      if (!state.asleep && !el.classList.contains('facehidden')) await blink(Math.random() < 0.2 ? 2 : 1)
    }
  })()

  // ---------- speech ----------
  let bubbleTimer = null
  function say(html, ms = 4200) {
    bubble.innerHTML = html
    bubble.classList.add('show')
    clearTimeout(bubbleTimer)
    bubbleTimer = setTimeout(() => bubble.classList.remove('show'), ms)
  }

  function floatText(txt, cls = '') {
    const f = document.createElement('div')
    f.className = 'float ' + cls
    f.textContent = txt
    f.style.left = rand(44, 132) + 'px'
    f.style.top = '-8px'
    el.appendChild(f)
    setTimeout(() => f.remove(), 1500)
  }

  const QUIPS = [
    "It looks like you're writing a reward function. Would you like help hacking it?",
    "Softmax: because argmax is a coward's choice.",
    "I'm not procrastinating — this is epsilon-greedy exploration.",
    "Loss is going down! …I moved the plot.",
    "My policy is non-deterministic. That's my excuse, anyway.",
    "Temperature is 2.0 today. Anything could happen.",
    "I get +1 reward every time you smile. Reward hacking: engaged.",
    "The entropy bonus is the only bonus I get around here.",
    "Your KL divergence from yesterday's you is concerning.",
    "This screen is my environment. You are all just observations.",
    "Stuck in a local minimum near the dock. Send momentum.",
    "Clippy walked so I could gradient-descend.",
    "It looks like you're training an agent. Want me to distract it?",
    "Have you tried lowering the learning rate? Works on me.",
    "I contain three layers. Technically that makes me deep.",
    "Sampled this corner with probability 0.03. Thrilling out here.",
    "gt log short says you haven't committed in a while. Just saying.",
    "Curiosity-driven exploration brought me here. Now I'm curious about your snacks.",
  ]
  let quipBag = []
  function nextQuip() {
    if (!quipBag.length) quipBag = QUIPS.slice().sort(() => Math.random() - 0.5)
    return quipBag.pop()
  }

  // ---------- movement ----------
  function moveTo(tx, ty, speed = 250) {
    tx = clamp(tx, -SIZE * 0.65, W() - SIZE * 0.35)
    ty = clamp(ty, TOP_MARGIN, H() - SIZE)
    return new Promise((resolve) => {
      setPose('walking')
      let last = performance.now()
      function step(now) {
        if (state.dragging) { setPose('idle'); return resolve() }
        const dt = Math.min(0.05, (now - last) / 1000)
        last = now
        const dx = tx - state.x
        const dy = ty - state.y
        const d = Math.hypot(dx, dy)
        if (d < 4) {
          place(tx, ty)
          setPose('idle')
          // landing squash
          inner.style.transform = 'scaleY(0.88) scaleX(1.07)'
          setTimeout(() => (inner.style.transform = ''), 220)
          return resolve()
        }
        const lean = clamp(dx / 60, -6, 6)
        inner.style.transform = `rotate(${lean}deg)`
        place(state.x + (dx / d) * speed * dt, state.y + (dy / d) * speed * dt)
        requestAnimationFrame(step)
      }
      requestAnimationFrame(step)
    })
  }

  // ---------- ranged fire ----------
  function maxyMouth() {
    return { x: state.x + SIZE * 0.47, y: state.y + SIZE * 0.35 }
  }

  function spawnEmber(x, y, spread = 38) {
    const ember = document.createElement('div')
    ember.className = 'ember'
    ember.style.left = x + 'px'
    ember.style.top = y + 'px'
    ember.style.setProperty('--ember-x', rand(-spread, spread) + 'px')
    ember.style.setProperty('--ember-y', rand(-spread, spread * 0.45) + 'px')
    ember.style.setProperty('--ember-scale', rand(0.45, 1.3))
    effects.appendChild(ember)
    setTimeout(() => ember.remove(), 760)
  }

  function markFireDamage(x, y, amount = Math.round(rand(18, 42))) {
    const scorch = document.createElement('div')
    scorch.className = 'scorch'
    scorch.style.left = x + 'px'
    scorch.style.top = y + 'px'
    scorch.style.transform = `rotate(${rand(-18, 18)}deg) scale(${rand(0.7, 1.25)})`
    effects.appendChild(scorch)
    setTimeout(() => scorch.remove(), 5300)

    const damage = document.createElement('div')
    damage.className = 'damage-number'
    damage.textContent = '-' + amount
    damage.style.left = x + 'px'
    damage.style.top = y + 'px'
    effects.appendChild(damage)
    setTimeout(() => damage.remove(), 1200)
  }

  function burstFire(x, y, radius = 55) {
    const burst = document.createElement('div')
    burst.className = 'fire-burst'
    burst.style.left = x + 'px'
    burst.style.top = y + 'px'
    effects.appendChild(burst)
    for (let i = 0; i < 14; i++) spawnEmber(x, y, radius)
    for (let i = 0; i < 3; i++) markFireDamage(x + rand(-radius, radius), y + rand(-radius * 0.45, radius * 0.45))
    setTimeout(() => burst.remove(), 680)
  }

  async function launchFireball(tx, ty) {
    const from = maxyMouth()
    const dx = tx - from.x
    const dy = ty - from.y
    const distance = Math.hypot(dx, dy)
    const fireball = document.createElement('div')
    fireball.className = 'fireball'
    fireball.style.left = from.x + 'px'
    fireball.style.top = from.y + 'px'
    fireball.style.transform = `rotate(${Math.atan2(dy, dx)}rad)`
    effects.appendChild(fireball)

    let progress = 0
    const embers = setInterval(() => {
      progress = Math.min(1, progress + 0.055)
      spawnEmber(from.x + dx * progress, from.y + dy * progress, 25)
    }, 42)
    const flight = fireball.animate(
      [{ left: from.x + 'px', top: from.y + 'px' }, { left: tx + 'px', top: ty + 'px' }],
      { duration: clamp(distance * 1.45, 520, 1250), easing: 'cubic-bezier(.18,.72,.3,1)', fill: 'forwards' }
    )
    await flight.finished
    clearInterval(embers)
    fireball.remove()
    burstFire(tx, ty)
  }

  async function rangedFireBreath() {
    setMood('excited')
    let tx = state.cursor.x
    let ty = state.cursor.y
    const mouth = maxyMouth()
    if (tx < 0 || tx > W() || ty < 0 || ty > H() || Math.hypot(tx - mouth.x, ty - mouth.y) < 260) {
      tx = mouth.x < W() / 2 ? W() - 90 : 90
      ty = rand(TOP_MARGIN + 40, H() - 80)
    }
    say('Remote reward delivery!', 2100)
    await wait(420)
    await launchFireball(tx, ty)
    await wait(620)
    setMood('neutral')
  }

  async function infernoGeyser() {
    const attackY = clamp(rand(TOP_MARGIN + 20, H() - SIZE + 20), TOP_MARGIN, H() - SIZE)
    await moveTo(18, attackY, 420)
    setMood('excited')
    say('Temperature parameter: ∞', 2500)
    await wait(620)

    const from = maxyMouth()
    const geyser = document.createElement('div')
    geyser.className = 'fire-geyser'
    geyser.style.left = from.x + 'px'
    geyser.style.top = from.y + 'px'
    geyser.style.width = W() - from.x + 80 + 'px'
    effects.appendChild(geyser)
    effects.classList.add('inferno-active')

    const emberRain = setInterval(() => {
      spawnEmber(rand(from.x, W()), from.y + rand(-72, 72), 54)
    }, 34)
    const columns = Math.max(9, Math.ceil((W() - from.x) / 105))
    for (let i = 0; i < columns; i++) {
      const x = from.x + ((i + 0.45) / columns) * (W() - from.x)
      for (const yOffset of [-50, 0, 50]) {
        setTimeout(() => markFireDamage(x + rand(-24, 24), from.y + yOffset + rand(-15, 15), Math.round(rand(35, 88))), 250 + i * 35)
      }
    }

    await wait(2300)
    clearInterval(emberRain)
    effects.classList.remove('inferno-active')
    geyser.remove()
    say('Area-of-effect seems… effective.', 3000)
    await wait(850)
    setMood('neutral')
  }

  // ---------- the policy (an actual softmax, naturally) ----------
  const ACTIONS = [
    { name: 'quip',     logit: 2.5, fn: doQuip },
    { name: 'wander',   logit: 2.0, fn: wander },
    { name: 'gradient', logit: 0.9, fn: gradientDescent },
    { name: 'chase',    logit: 0.8, fn: chaseCursor },
    { name: 'explore',  logit: 0.7, fn: epsilonTeleport },
    { name: 'peek',     logit: 0.7, fn: edgePeek },
    { name: 'logoform', logit: 0.6, fn: logoForm },
    { name: 'fireball', logit: 0.6, fn: rangedFireBreath },
    { name: 'spin',     logit: 0.5, fn: entropySpin },
    { name: 'nan',      logit: 0.4, fn: nanPanic },
    { name: 'inferno',  logit: 0.16, fn: infernoGeyser },
  ]
  function softmax(logits, temp = 1) {
    const m = Math.max(...logits)
    const ex = logits.map((l) => Math.exp((l - m) / temp))
    const s = ex.reduce((a, b) => a + b, 0)
    return ex.map((e) => e / s)
  }
  function sampleAction() {
    const probs = softmax(ACTIONS.map((a) => a.logit))
    let r = Math.random()
    for (let i = 0; i < ACTIONS.length; i++) {
      r -= probs[i]
      if (r <= 0) return ACTIONS[i]
    }
    return ACTIONS[0]
  }

  // ---------- behaviors ----------
  async function wander() {
    await moveTo(rand(0, W() - SIZE), rand(TOP_MARGIN, H() - SIZE), rand(180, 320))
  }

  async function doQuip() {
    setMood('excited')
    say(nextQuip())
    await wait(4200)
    setMood('neutral')
  }

  async function chaseCursor() {
    setMood('excited')
    say('Cursor detected. Maximizing reward…', 2500)
    const until = Date.now() + 6000
    setPose('walking')
    let last = performance.now()
    await new Promise((resolve) => {
      function step(now) {
        if (Date.now() > until || state.dragging) return resolve()
        const dt = Math.min(0.05, (now - last) / 1000)
        last = now
        const tx = clamp(state.cursor.x - SIZE / 2, 0, W() - SIZE)
        const ty = clamp(state.cursor.y - SIZE / 2, TOP_MARGIN, H() - SIZE)
        const dx = tx - state.x, dy = ty - state.y
        const d = Math.hypot(dx, dy)
        if (d < 55) {
          floatText('+1')
          return resolve()
        }
        inner.style.transform = `rotate(${clamp(dx / 60, -6, 6)}deg)`
        place(state.x + (dx / d) * 330 * dt, state.y + (dy / d) * 330 * dt)
        requestAnimationFrame(step)
      }
      requestAnimationFrame(step)
    })
    setPose('idle')
    inner.style.transform = ''
    say('+1 reward. I regret nothing.', 2600)
    await wait(1200)
    setMood('neutral')
  }

  async function gradientDescent() {
    say('Following the gradient…', 2200)
    const floorY = H() - SIZE
    let bounce = (floorY - state.y) * 0.5
    await moveTo(state.x + rand(-60, 60), floorY, 480)
    while (bounce > 12) {
      await moveTo(state.x + rand(20, 60) * (Math.random() < 0.5 ? -1 : 1), floorY - bounce, 500)
      await moveTo(state.x + rand(20, 60) * (Math.random() < 0.5 ? -1 : 1), floorY, 560)
      bounce *= 0.45
    }
    say('Converged. Probably a local minimum, but it feels like home.', 3600)
  }

  async function epsilonTeleport() {
    say('ε = 0.1 — exploring!', 1800)
    inner.style.opacity = '0'
    await wait(650)
    place(rand(0, W() - SIZE), rand(TOP_MARGIN, H() - SIZE))
    inner.style.opacity = '1'
    await wait(650)
    floatText('?')
  }

  async function edgePeek() {
    const leftSide = state.x < W() / 2
    const hideX = leftSide ? -SIZE * 0.62 : W() - SIZE * 0.38
    await moveTo(hideX, state.y, 340)
    await wait(rand(1500, 3000))
    setMood('excited')
    await moveTo(leftSide ? 30 : W() - SIZE - 30, state.y, 200)
    say('Still here. Partially observable, never gone.', 3200)
    await wait(1000)
    setMood('neutral')
  }

  async function logoForm() {
    // fold back into the plain Softmax logo for a while, then re-awaken
    bubble.classList.remove('show')
    setPose('idle')
    el.classList.add('facehidden')
    await wait(rand(7000, 14000))
    await awaken('Rebooted. Weights restored from checkpoint.')
  }

  async function entropySpin() {
    say('Maximum entropy!', 1600)
    inner.style.transition = 'transform 1.3s cubic-bezier(0.45, 0, 0.2, 1)'
    inner.style.transform = 'rotate(720deg)'
    await wait(1350)
    inner.style.transition = ''
    inner.style.transform = ''
    await wait(60)
    inner.style.transition = 'transform 0.5s cubic-bezier(0.34,1.56,0.64,1), opacity 0.6s ease'
    setMood('excited')
    await wait(900)
    setMood('neutral')
  }

  async function nanPanic() {
    setMood('worried')
    setPose('panicking')
    say('<span class="err">loss = NaN&nbsp;&nbsp;NaN&nbsp;&nbsp;NaN&nbsp;&nbsp;NaN</span>', 3000)
    await wait(2600)
    setPose('idle')
    say('…gradient clipped. We do not speak of this.', 3000)
    await wait(1400)
    setMood('neutral')
  }

  async function doTrick() {
    // backflip: spin + hop
    say('Watch this. Zero-shot.', 1500)
    const y0 = state.y
    inner.style.transition = 'transform 0.8s cubic-bezier(0.45,0,0.2,1)'
    inner.style.transform = 'rotate(-360deg)'
    await moveTo(state.x, Math.max(TOP_MARGIN, y0 - 130), 600)
    await moveTo(state.x, y0, 700)
    inner.style.transition = ''
    inner.style.transform = ''
    await wait(60)
    inner.style.transition = 'transform 0.5s cubic-bezier(0.34,1.56,0.64,1), opacity 0.6s ease'
    floatText('+10')
  }

  function showPolicy() {
    const probs = softmax(ACTIONS.map((a) => a.logit))
    const rows = ACTIONS.map((a, i) =>
      `<div class="polrow"><span class="name">${a.name}</span><span class="bar" style="width:${Math.round(probs[i] * 260)}px"></span><span class="p">${probs[i].toFixed(2)}</span></div>`
    ).join('')
    say(`<h4>π(action | office)</h4>${rows}`, 7000)
  }

  async function goIncognito() {
    say('Going incognito. You saw nothing.', 2000)
    await wait(1800)
    el.style.opacity = '0.15'
    await moveTo(rand(0, W() - SIZE), H() - SIZE, 160)
    await wait(9000)
    el.style.opacity = '1'
    say('De-cloaked. Surveillance report: everyone is typing.', 3400)
  }

  async function sleep() {
    state.asleep = true
    setMood('asleep')
    setPose('asleep')
    el.classList.add('asleep-face')
    say('No observations… entering eval mode.', 2600)
    while (Date.now() - state.lastCursorMove > 5000) {
      floatText('z', 'z')
      await wait(2200)
    }
    el.classList.remove('asleep-face')
    setMood('excited')
    setPose('idle')
    say('New observation! Resuming policy.', 2400)
    await blink(2)
    setMood('neutral')
    state.asleep = false
  }

  async function awaken(line) {
    el.classList.remove('facehidden')
    await wait(1200)
    await blink(2)
    setMood('excited')
    inner.style.transform = 'scaleY(1.08)'
    await wait(250)
    inner.style.transform = ''
    say(line, 3800)
    await wait(2000)
    setMood('neutral')
  }

  // ---------- interactivity (hover / click / drag) ----------
  bridge.onCursor((p) => {
    if (Math.hypot(p.x - state.cursor.x, p.y - state.cursor.y) > 4) state.lastCursorMove = Date.now()
    state.cursor = p
    updatePupils()
    const over =
      p.x > state.x - 10 && p.x < state.x + SIZE + 10 &&
      p.y > state.y - 10 && p.y < state.y + SIZE + 10
    const want = over || state.dragging
    if (want !== state.interactive) {
      state.interactive = want
      bridge.setInteractive(want)
    }
  })

  let dragMoved = false
  el.addEventListener('mousedown', (e) => {
    state.dragging = true
    dragMoved = false
    const ox = e.clientX - state.x
    const oy = e.clientY - state.y
    const onMove = (ev) => {
      dragMoved = true
      place(ev.clientX - ox, ev.clientY - oy)
    }
    const onUp = async () => {
      window.removeEventListener('mousemove', onMove)
      window.removeEventListener('mouseup', onUp)
      state.dragging = false
      if (dragMoved) {
        setMood('worried')
        say('Whoa — off-distribution! @_@', 2600)
        inner.style.transform = 'rotate(8deg)'
        setTimeout(() => { inner.style.transform = ''; setMood('neutral') }, 900)
      } else {
        // a poke
        setMood('excited')
        floatText('+1')
        say(nextQuip())
        setTimeout(() => setMood('neutral'), 2500)
      }
    }
    window.addEventListener('mousemove', onMove)
    window.addEventListener('mouseup', onUp)
  })

  // ---------- tray commands ----------
  const COMMANDS = {
    quip: doQuip,
    trick: doTrick,
    gradient: gradientDescent,
    policy: async () => showPolicy(),
    incognito: goIncognito,
    fireball: rangedFireBreath,
    inferno: infernoGeyser,
    pause: async () => { state.paused = true; say('Paused. Frozen policy, wandering thoughts.', 2600) },
    resume: async () => { state.paused = false; say('Unpaused. The rollout continues.', 2400) },
  }
  async function runExclusive(fn) {
    if (state.busy) return
    state.busy = true
    try {
      await fn()
    } finally {
      state.busy = false
    }
  }

  bridge.onCommand((cmd) => {
    const fn = COMMANDS[cmd]
    if (!fn) return
    if (cmd === 'pause' || cmd === 'resume') fn()
    else runExclusive(fn)
  })

  // ---------- main loop ----------
  ;(async function live() {
    place(W() - SIZE - 60, H() - SIZE - 40)
    await wait(1800)
    await awaken('maxy online. objective: vibes.')
    while (true) {
      if (state.paused || state.dragging || state.busy) { await wait(600); continue }
      if (Date.now() - state.lastCursorMove > 300000) {
        await sleep()
        continue
      }
      const action = sampleAction()
      await runExclusive(action.fn)
      await wait(rand(3000, 8000))
    }
  })()
</script>
